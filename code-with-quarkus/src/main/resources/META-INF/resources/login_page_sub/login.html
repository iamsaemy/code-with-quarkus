<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOL - 로그인</title>

    <!-- Bootstrap 5 CSS 연결 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #0a0e17;
        color: #fff;
        font-family: Arial, sans-serif;
      }

      .navbar {
        background-color: #000;
      }

      .login-section {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(to bottom, #1e1e1e, #0a0e17);
      }

      .login-box {
        width: 100%;
        max-width: 420px;
        background-color: #1e1e1e;
        padding: 32px;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(160, 32, 240, 0.3);
      }

      .btn-login {
        background-color: #a020f0;
        color: #fff;
        border: none;
      }

      .btn-login:hover {
        background-color: #800080;
        color: #fff;
      }
    </style>
  </head>

  <body>
    <!-- 네비바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/index.html">League of Legends</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavDarkDropdown"
          aria-controls="navbarNavDarkDropdown"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavDarkDropdown">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/index.html">메인화면</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/index.html#news">뉴스</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/index.html#champions">챔피언</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/main_page_sub/download.html"
                >다운로드</a
              >
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="/login_page_sub/login.html"
                >로그인</a
              >
            </li>

            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                id="externalSiteDropdown"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                외부사이트
              </a>

              <ul
                class="dropdown-menu dropdown-menu-dark"
                aria-labelledby="externalSiteDropdown"
              >
                <li>
                  <a
                    class="dropdown-item"
                    href="https://www.leagueoflegends.com/ko-kr/"
                    target="_blank"
                  >
                    LOL 공식 웹사이트
                  </a>
                </li>

                <li>
                  <a
                    class="dropdown-item"
                    href="https://getbootstrap.kr/docs/5.0/"
                    target="_blank"
                  >
                    Bootstrap 공식문서
                  </a>
                </li>

                <li>
                  <a
                    class="dropdown-item"
                    href="https://quarkus.io/"
                    target="_blank"
                  >
                    Quarkus 공식문서
                  </a>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- 로그인 영역 -->
    <section class="login-section">
      <div class="login-box">
        <h2 class="text-center mb-4">로그인</h2>

        <form>
          <div class="mb-3">
            <label for="userId" class="form-label">아이디</label>
            <input
              type="text"
              class="form-control"
              id="userId"
              placeholder="아이디를 입력하세요"
            />
          </div>

          <div class="mb-4">
            <label for="userPassword" class="form-label">비밀번호</label>
            <input
              type="password"
              class="form-control"
              id="userPassword"
              placeholder="비밀번호를 입력하세요"
            />
          </div>

          <button type="submit" class="btn btn-login w-100">로그인</button>
        </form>
      </div>
    </section>

    <!-- Bootstrap 5 JS 연결 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
