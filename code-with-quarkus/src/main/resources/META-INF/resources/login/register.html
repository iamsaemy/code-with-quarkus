<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>회원가입</title>

    <!-- Bootstrap CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- 기존 메인 CSS -->
    <link rel="stylesheet" href="/css/main.css" />
  </head>

  <body>
    <!-- 네비바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/"> League of Legends </a>

        <div class="d-flex">
          <a class="nav-link text-white me-3" href="/">메인화면</a>
          <a class="nav-link text-white" href="/login">로그인</a>
        </div>
      </div>
    </nav>

    <!-- 회원가입 영역 -->
    <section
      class="hero d-flex align-items-center justify-content-center text-center py-5"
    >
      <div class="container" style="max-width: 480px">
        <h2 class="fw-bold mb-4">회원가입</h2>

        <form id="registerForm" action="/register_check" method="post">
          <!-- 아이디 -->
          <div class="mb-3 text-start">
            <label class="form-label">아이디 *</label>
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              placeholder="4~20자 영문/숫자"
              required
            />
            <div class="invalid-feedback" id="usernameMsg"></div>
          </div>

          <!-- 패스워드 -->
          <div class="mb-3 text-start">
            <label class="form-label">패스워드 *</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="8자 이상, 영문+숫자+특수문자"
              required
            />
            <div class="invalid-feedback" id="passwordMsg"></div>
          </div>

          <!-- 패스워드 확인 -->
          <div class="mb-3 text-start">
            <label class="form-label">패스워드 확인 *</label>
            <input
              type="password"
              class="form-control"
              id="passwordConfirm"
              placeholder="패스워드 재입력"
              required
            />
            <div class="invalid-feedback" id="passwordConfirmMsg"></div>
          </div>

          <!-- 이메일 -->
          <div class="mb-3 text-start">
            <label class="form-label">이메일 *</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="example@email.com"
              required
            />
            <div class="invalid-feedback" id="emailMsg"></div>
          </div>

          <!-- 연락처 -->
          <div class="mb-3 text-start">
            <label class="form-label">연락처 *</label>
            <input
              type="text"
              class="form-control"
              id="phone"
              name="phone"
              placeholder="010-0000-0000"
              required
            />
            <div class="invalid-feedback" id="phoneMsg"></div>
          </div>

          <!-- 암호화된 비밀번호가 서버로 전송될 hidden input -->
          <input type="hidden" id="hashedPassword" name="password" />

          <button
            type="button"
            class="btn btn-primary w-100"
            onclick="validateAndShowModal()"
          >
            회원가입
          </button>

          <hr />

          <a href="/login" class="btn btn-outline-secondary w-100">
            로그인 페이지로 이동
          </a>
        </form>
      </div>
    </section>

    <!-- 회원가입 확인 모달 -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-dark">
          <div class="modal-header">
            <h5 class="modal-title">회원가입 확인</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="닫기"
            ></button>
          </div>

          <div class="modal-body">
            입력한 정보로 회원가입을 진행하시겠습니까?
          </div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              취소
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="submitRegisterForm()"
            >
              확인
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SHA-256 암호화 JS -->
    <script src="/js/input_sha256.js"></script>

    <!-- 회원가입 입력값 검사 JS -->
    <script src="/js/input_check.js"></script>
  </body>
</html>
