<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - League of Legends</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- 기존 main.css 재사용 -->
    <link rel="stylesheet" href="../css/main.css" />
  </head>

  <body>
    <!-- 상단 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
          <img src="/images/logo.png" alt="LOL 로고" width="30" height="24" />
          League of Legends
        </a>

        <button
          class="btn border-0"
          id="themeToggleBtn"
          onclick="toggleTheme()"
        >
          🌙 DARK
        </button>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavDarkDropdown"
          aria-controls="navbarNavDarkDropdown"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavDarkDropdown">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">메인화면</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/#news">뉴스</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/#champions">챔피언</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/main_page_sub/download.html">
                다운로드
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="/login">로그인</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- 로그인 영역 -->
    <section
      class="hero d-flex align-items-center justify-content-center text-center py-5"
    >
      <div class="container" style="max-width: 400px">
        <h2 class="fw-bold mb-4">로그인</h2>

        <!--
          로그인 폼
          - username: 서버로 전송되는 아이디
          - passwordInput: 사용자가 입력하는 원본 비밀번호
          - hidden password: SHA-256 해시값으로 변환되어 서버로 전송됨
          - autocomplete="off": 브라우저가 이전 아이디를 자동 입력하지 않도록 설정
        -->
        <form
          method="POST"
          action="/login_check"
          id="loginForm"
          autocomplete="off"
        >
          <!-- 아이디 -->
          <div class="mb-3 text-start">
            <label class="form-label">아이디</label>
            <input
              type="text"
              class="form-control"
              id="usernameInput"
              name="username"
              placeholder="4~20자 영문/숫자"
              autocomplete="off"
              value=""
              required
            />
            <div class="invalid-feedback" id="usernameMsg"></div>
          </div>

          <!-- 패스워드 -->
          <div class="mb-3 text-start">
            <label class="form-label">패스워드</label>
            <input
              type="password"
              class="form-control"
              id="passwordInput"
              placeholder="8자 이상, 영문+숫자+특수문자"
              autocomplete="new-password"
              value=""
              required
            />
            <div class="invalid-feedback" id="passwordMsg"></div>

            <!-- 서버로 실제 전송되는 비밀번호: SHA-256 해시값 -->
            <input type="hidden" id="password" name="password" value="" />
          </div>

          <!-- JS에서 유효성 검사 + SHA-256 암호화 후 submit 처리 -->
          <button
            type="button"
            onclick="validateAndLogin()"
            class="btn btn-primary w-100"
          >
            로그인
          </button>

          <hr />

          <a href="/register" class="btn btn-outline-secondary w-100">
            회원가입
          </a>
        </form>
      </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 다크/라이트 모드 JS -->
    <script src="../js/toggle.js"></script>

    <!-- 로그인 입력값 자동완성/이전값 제거 -->
    <script>
      // 페이지가 열릴 때 브라우저가 이전 로그인 값을 채워도 강제로 비운다.
      window.addEventListener("DOMContentLoaded", function () {
        const usernameInput = document.getElementById("usernameInput");
        const passwordInput = document.getElementById("passwordInput");
        const hiddenPassword = document.getElementById("password");

        if (usernameInput) {
          usernameInput.value = "";
          usernameInput.setAttribute("autocomplete", "off");
        }

        if (passwordInput) {
          passwordInput.value = "";
          passwordInput.setAttribute("autocomplete", "new-password");
        }

        if (hiddenPassword) {
          hiddenPassword.value = "";
        }
      });

      // 일부 브라우저는 DOMContentLoaded 이후 자동완성을 다시 넣기 때문에 한 번 더 비운다.
      window.addEventListener("pageshow", function () {
        const usernameInput = document.getElementById("usernameInput");
        const passwordInput = document.getElementById("passwordInput");
        const hiddenPassword = document.getElementById("password");

        setTimeout(function () {
          if (usernameInput) usernameInput.value = "";
          if (passwordInput) passwordInput.value = "";
          if (hiddenPassword) hiddenPassword.value = "";
        }, 100);
      });
    </script>

    <!-- 로그인 암호화 체크 JS -->
    <script src="../js/input_sha256.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
