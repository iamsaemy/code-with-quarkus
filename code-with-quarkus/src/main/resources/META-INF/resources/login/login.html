<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - League of Legends</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- 기존 main.css 재사용 -->
    <link rel="stylesheet" href="../css/main.css" />
  </head>

  <body>
    <!-- 상단 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="/index.html"
        >
          <img src="/images/logo.png" alt="LOL 로고" width="30" height="24" />
          League of Legends
        </a>

        <button
          class="btn border-0"
          id="themeToggleBtn"
          onclick="toggleTheme()"
        >
          🌙 DARK
        </button>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavDarkDropdown"
          aria-controls="navbarNavDarkDropdown"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavDarkDropdown">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/index.html">메인화면</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/index.html#news">뉴스</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/index.html#champions">챔피언</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/main_page_sub/download.html">
                다운로드
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="/login">로그인</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- 로그인 영역 -->
    <section
      class="hero d-flex align-items-center justify-content-center text-center py-5"
    >
      <div class="container" style="max-width: 400px">
        <h2 class="fw-bold mb-4">로그인</h2>

        <!-- 
          11주차 20페이지 핵심
          id="loginForm" 추가
          password는 사용자가 입력하는 원본 비밀번호
          hidden password는 SHA-256 해시값을 서버로 전송
        -->
        <form method="POST" action="/login_check" id="loginForm">
          <!-- 아이디 -->
          <div class="mb-3 text-start">
            <label class="form-label">아이디</label>
            <input
              type="text"
              class="form-control"
              id="usernameInput"
              name="username"
              placeholder="4~20자 영문/숫자"
              required
            />
            <div class="invalid-feedback" id="usernameMsg"></div>
          </div>

          <!-- 패스워드 -->
          <div class="mb-3 text-start">
            <label class="form-label">패스워드</label>
            <input
              type="password"
              class="form-control"
              id="passwordInput"
              placeholder="8자 이상, 영문+숫자+특수문자"
              required
            />
            <div class="invalid-feedback" id="passwordMsg"></div>

            <!-- 서버로 실제 전송되는 비밀번호: SHA-256 해시값 -->
            <input type="hidden" id="password" name="password" />
          </div>

          <!-- type="submit" 아님. JS 검사 후 submit 처리 -->
          <button
            type="button"
            onclick="validateAndLogin()"
            class="btn btn-primary w-100"
          >
            로그인
          </button>

          <hr />

          <a href="/register" class="btn btn-outline-secondary w-100">
            회원가입
          </a>
        </form>
      </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 다크/라이트 모드 JS -->
    <script src="../js/toggle.js"></script>

    <!-- 11주차 20페이지: 로그인 암호화 체크 JS -->
    <script src="../js/input_sha256.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
