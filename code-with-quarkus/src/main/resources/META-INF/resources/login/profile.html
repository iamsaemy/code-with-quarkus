<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프로필 페이지 - League of Legends</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- 기존 CSS 재사용 -->
    <link rel="stylesheet" href="/css/main.css" />
  </head>

  <body>
    <!-- 상단 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="/after_login"
        >
          <img src="/images/logo.png" alt="LOL 로고" width="30" height="24" />
          League of Legends
        </a>

        <button
          class="btn border-0"
          id="themeToggleBtn"
          onclick="toggleTheme()"
        >
          🌙 DARK
        </button>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavDarkDropdown"
          aria-controls="navbarNavDarkDropdown"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavDarkDropdown">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/after_login">메인화면</a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="/profile">👤 프로필</a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link btn btn-outline-danger btn-sm px-3"
                href="/logout"
              >
                로그아웃
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- 프로필 페이지 화면 -->
    <section
      class="hero d-flex align-items-center justify-content-center text-center py-5"
    >
      <div class="container" style="max-width: 500px">
        <h2 class="fw-bold mb-4">👤 내 프로필</h2>

        <!-- 프로필 사진 영역 -->
        <div class="mb-4">
          <img
            id="profileImg"
            src="/images/logo.png"
            class="rounded-circle"
            width="120"
            height="120"
            style="object-fit: cover; border: 3px solid #fff"
            alt="프로필 사진"
          />
        </div>

        <!-- 개인 정보 출력 -->
        <div class="card bg-dark text-white border-secondary mb-4">
          <div class="card-body text-start">
            <table class="table table-dark table-bordered mb-0">
              <tr>
                <th style="width: 30%">아이디</th>
                <td id="infoUsername"></td>
              </tr>
              <tr>
                <th>이메일</th>
                <td id="infoEmail"></td>
              </tr>
              <tr>
                <th>연락처</th>
                <td id="infoPhone"></td>
              </tr>
            </table>
          </div>
        </div>

        <!-- 12주차 마무리 과제: 업로드 오류 메시지 출력 영역 -->
        <div
          id="uploadErrorMsg"
          class="alert alert-danger d-none mb-3"
          role="alert"
        ></div>

        <!-- 사진 업로드 폼 -->
        <form
          id="uploadForm"
          method="POST"
          action="/profile/upload"
          enctype="multipart/form-data"
          class="text-start"
        >
          <div class="mb-3">
            <label class="form-label">프로필 사진 변경</label>
            <input
              type="file"
              class="form-control"
              id="profileFile"
              name="profileImage"
              accept="image/*"
            />
            <div class="form-text text-muted">
              jpg, png, gif, webp / 최대 5MB
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            사진 업로드
          </button>
        </form>
      </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 기존 JS -->
    <script src="/js/toggle.js"></script>

    <script>
      // 프로필 정보 불러오기
      window.addEventListener("load", function () {
        fetch("/profile/info")
          .then((response) => response.json())
          .then((data) => {
            document.getElementById("infoUsername").textContent =
              data.username || data["사용자 이름"] || "정보 없음";

            document.getElementById("infoEmail").textContent =
              data.email || data["이메일"] || "정보 없음";

            document.getElementById("infoPhone").textContent =
              data.phone || data["전화번호"] || "정보 없음";

            const profileImage = data.profileImage || data["프로필이미지"];

            if (profileImage) {
              document.getElementById("profileImg").src =
                "/uploads/profile/" + profileImage;
            }
          })
          .catch((error) => {
            console.error("프로필 정보를 불러오는 중 오류 발생:", error);

            document.getElementById("infoUsername").textContent = "정보 없음";
            document.getElementById("infoEmail").textContent = "정보 없음";
            document.getElementById("infoPhone").textContent = "정보 없음";
          });

        // 12주차 마무리 과제: 업로드 오류 메시지 표시
        const params = new URLSearchParams(window.location.search);
        const error = params.get("error");
        const uploadErrorMsg = document.getElementById("uploadErrorMsg");

        if (error === "invalid_type") {
          uploadErrorMsg.textContent = "jpg, png, gif, webp 파일만 가능합니다.";
          uploadErrorMsg.classList.remove("d-none");
        } else if (error === "too_large") {
          uploadErrorMsg.textContent = "파일 크기는 5MB 이하여야 합니다.";
          uploadErrorMsg.classList.remove("d-none");
        } else if (error === "upload_fail") {
          uploadErrorMsg.textContent = "업로드 실패. 다시 시도해주세요.";
          uploadErrorMsg.classList.remove("d-none");
        }
      });
    </script>
  </body>
</html>
