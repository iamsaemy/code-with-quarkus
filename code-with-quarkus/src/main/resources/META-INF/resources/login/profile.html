<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프로필 페이지 - League of Legends</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- 기존 CSS 재사용 -->
    <link rel="stylesheet" href="/css/main.css" />
  </head>

  <body>
    <!-- 상단 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="/after_login"
        >
          <img src="/images/logo.png" alt="LOL 로고" width="30" height="24" />
          League of Legends
        </a>

        <button
          class="btn border-0"
          id="themeToggleBtn"
          onclick="toggleTheme()"
        >
          🌙 DARK
        </button>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavDarkDropdown"
          aria-controls="navbarNavDarkDropdown"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavDarkDropdown">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/after_login">메인화면</a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link active"
                href="/profile"
                id="profileNavLink"
                data-bs-toggle="tooltip"
                data-bs-placement="bottom"
              >
                👤 프로필
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link btn btn-outline-danger btn-sm px-3"
                href="/logout"
              >
                로그아웃
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- 프로필 페이지 화면 -->
    <section
      class="hero d-flex align-items-center justify-content-center text-center py-5"
    >
      <div class="container" style="max-width: 500px">
        <h2 class="fw-bold mb-4">👤 내 프로필</h2>

        <!-- 프로필 사진 영역 -->
        <div class="mb-4">
          <img
            id="profileImg"
            src="/images/logo.png"
            class="rounded-circle"
            width="120"
            height="120"
            style="object-fit: cover; border: 3px solid #fff"
            alt="프로필 사진"
          />
        </div>

        <!-- 개인 정보 출력 -->
        <div class="card bg-dark text-white border-secondary mb-4">
          <div class="card-body text-start">
            <table class="table table-dark table-bordered mb-0">
              <tr>
                <th style="width: 30%">아이디</th>
                <td id="infoUsername"></td>
              </tr>
              <tr>
                <th>이메일</th>
                <td id="infoEmail"></td>
              </tr>
              <tr>
                <th>연락처</th>
                <td id="infoPhone"></td>
              </tr>
            </table>
          </div>
        </div>

        <!-- 업로드 오류 메시지 출력 영역 -->
        <div
          id="uploadErrorMsg"
          class="alert alert-danger d-none mb-3"
          role="alert"
        ></div>

        <!-- 사진 업로드 폼 -->
        <form
          id="uploadForm"
          method="POST"
          action="/profile/upload"
          enctype="multipart/form-data"
          class="text-start"
        >
          <div class="mb-3">
            <label class="form-label">프로필 사진 변경</label>
            <input
              type="file"
              class="form-control"
              id="profileFile"
              name="profileImage"
              accept="image/*"
            />
            <div class="form-text text-muted">
              jpg, png, gif, webp / 최대 5MB
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            사진 업로드
          </button>
        </form>

        <hr class="my-4" />

        <!-- 13주차 10~11페이지: 개인정보 수정 폼 -->
        <button
          class="btn btn-warning w-100 mb-2"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#updateFormArea"
          aria-expanded="false"
        >
          개인정보 수정
        </button>

        <div class="collapse" id="updateFormArea">
          <div class="card card-body bg-dark text-white border-secondary mt-2">
            <div id="updateMsg" class="alert d-none mb-3"></div>

            <form id="updateForm" method="POST" action="/profile/update">
              <div class="mb-3 text-start">
                <label class="form-label">이메일</label>
                <input
                  type="text"
                  class="form-control"
                  id="updateEmail"
                  name="email"
                  placeholder="example@email.com"
                />
                <div class="invalid-feedback" id="updateEmailMsg"></div>
              </div>

              <div class="mb-3 text-start">
                <label class="form-label">연락처</label>
                <input
                  type="text"
                  class="form-control"
                  id="updatePhone"
                  name="phone"
                  placeholder="010-0000-0000"
                />
                <div class="invalid-feedback" id="updatePhoneMsg"></div>
              </div>

              <button
                type="button"
                class="btn btn-warning w-100"
                onclick="validateAndUpdate()"
              >
                수정 완료
              </button>
            </form>
          </div>
        </div>

        <!-- 13주차 16~17페이지: 비밀번호 변경 폼 -->
        <button
          class="btn btn-danger w-100 mt-3 mb-2"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#passwordFormArea"
          aria-expanded="false"
        >
          비밀번호 변경
        </button>

        <div class="collapse" id="passwordFormArea">
          <div class="card card-body bg-dark text-white border-secondary mt-2">
            <div id="passwordMsg" class="alert d-none mb-3"></div>

            <form id="passwordForm" method="POST" action="/profile/password">
              <div class="mb-3 text-start">
                <label class="form-label">현재 비밀번호</label>
                <input
                  type="password"
                  class="form-control"
                  id="currentPasswordInput"
                  placeholder="현재 비밀번호"
                />
                <input
                  type="hidden"
                  id="currentPassword"
                  name="currentPassword"
                />
                <div class="invalid-feedback" id="currentPasswordMsg"></div>
              </div>

              <div class="mb-3 text-start">
                <label class="form-label">새 비밀번호</label>
                <input
                  type="password"
                  class="form-control"
                  id="newPasswordInput"
                  placeholder="8자 이상, 영문+숫자+특수문자"
                />
                <input type="hidden" id="newPassword" name="newPassword" />
                <div class="invalid-feedback" id="newPasswordMsg"></div>
              </div>

              <div class="mb-3 text-start">
                <label class="form-label">새 비밀번호 확인</label>
                <input
                  type="password"
                  class="form-control"
                  id="newPasswordConfirmInput"
                  placeholder="새 비밀번호 확인"
                />
                <div class="invalid-feedback" id="newPasswordConfirmMsg"></div>
              </div>

              <button
                type="button"
                class="btn btn-danger w-100"
                onclick="validateAndChangePassword()"
              >
                비밀번호 변경 완료
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>

    <!-- Toast 컨테이너 -->
    <div
      class="toast-container position-fixed bottom-0 end-0 p-3"
      style="z-index: 9999"
    >
      <div
        id="liveToast"
        class="toast align-items-center text-white bg-success border-0"
        role="alert"
      >
        <div class="d-flex">
          <div class="toast-body" id="toastBody">메시지</div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="닫기"
          ></button>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 기존 JS -->
    <script src="/js/test.js"></script>
    <script src="/js/input_sha256.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/toggle.js"></script>
  </body>
</html>
